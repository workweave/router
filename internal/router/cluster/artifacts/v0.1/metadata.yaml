# Cluster routing artifact v0.1 — P0 bootstrap (Anthropic-only)
#
# First production cluster scorer. AvengersPro-derived (arxiv 2508.12631):
# K-means over Jina v2 INT8 embeddings, top-p=4, α-blended ranking matrix.
# Trained on 751 OpenRouterBench prompts mapping bench columns to three
# deployed Anthropic targets (Opus / Sonnet / Haiku) via a tier-collapsed
# bench_to_deployed map. claude-opus-4-7's ranking row was the average of
# gpt-5 + gemini-2.5-pro columns; haiku used gemini-2.5-flash as proxy.
#
# Frozen for comparison purposes. The model_registry.json was rewritten
# to the v0.2+ flat schema so the Go loader handles every bundle uniformly,
# but the rankings.json values are unchanged from the original training run.
#
# Promoted: 2025-09 (initial cluster ship). Frozen: 2026-04-30 when v0.2
# took over as the active cluster.

version: "v0.1"
parent: null
status: frozen
promoted_date: "2025-09-15"
frozen_date: "2026-04-30"

embedder:
  model: jina-v2-base-code-int8
  embed_dim: 768
  max_tokens: 256

training:
  k: 10
  top_p: 4
  alpha: 0.53
  seed: 42
  n_prompts: 751
  training_data_mix:
    d1: 1.0
    d2: 0.0
    d3: 0.0

deployed_providers:
  - anthropic

# What this version routes to. Sourced from artifacts/v0.1/model_registry.json
# at training time; mirrored here so the eval harness can compare versions
# without parsing each registry.
deployed_models:
  - claude-opus-4-7
  - claude-sonnet-4-5
  - claude-haiku-4-5

# Per-1k INPUT token cost used in the α-blend. Output cost is eval-only;
# the runtime scorer is a single argmax with no per-request cost lookup.
cost_per_1k_input_usd:
  claude-opus-4-7:   15.00
  claude-sonnet-4-5:  3.00
  claude-haiku-4-5:   0.80

changelog: |
  Initial cluster scorer. Anthropic-only deployment set: collapses gpt-5,
  gemini-2.5-pro, claude-sonnet-4, gemini-2.5-flash bench columns down to
  3 deployed Anthropic targets via a tier-keyed map. Aggregates bench
  scores by averaging columns assigned to the same tier (e.g. opus's row
  is mean(gpt-5, gemini-2.5-pro)).
