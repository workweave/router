deployed_models:
  - claude-haiku-4-5
  - claude-opus-4-7
  - claude-sonnet-4-5
  - gemini-3-flash-preview
  - gemini-3.1-flash-lite-preview
  - gemini-3.1-pro-preview
  - gpt-4.1
  - gpt-5.5
cost_per_1k_input_usd:
  claude-haiku-4-5: 0.8
  claude-opus-4-7: 15.0
  claude-sonnet-4-5: 3.0
  gemini-3-flash-preview: 0.5
  gemini-3.1-flash-lite-preview: 0.1
  gemini-3.1-pro-preview: 2.0
  gpt-4.1: 2.0
  gpt-5.5: 5.0
changelog: |
  v0.5: per-prompt rank normalization across bench columns + Bayesian shrinkage backfill (k0=10). Fixes Opus collapse to 0% argmax wins observed in v0.4 — SWE-bench binary labels were dragging Opus's per-cluster mean below cheaper models, while
    sparse-coverage models (gpt-4.1) had global means broadcast into empty cells.
