changelog: 'v0.70 = v0.68 with four new models added on FROZEN v0.68 geometry
  (z-ai/glm-5.2, minimax/minimax-m3, moonshotai/kimi-k2.7, qwen/qwen3.7-plus).
  centroids.bin is BYTE-IDENTICAL to v0.68 (no retrain, no re-cluster): v0.68''s
  training corpus is no longer reproducible (OpenRouterBench source returns 0 rows,
  routerarena label file drifted), so retraining would churn the geometry (the
  rejected v0.69 path regressed hard-agentic solve ~13pt purely from cluster
  movement). Instead this is a geometry-frozen ADDITIVE OVERLAY
  (scripts/build_v079_additive_overlay.py): each new model is calibrated onto v0.68''s
  per-cluster q_norm scale via existing models'' shared v0.68-geometry DeepSWE solve
  rates (eval/deepswe_quality_priors_v0.68.json) as anchors (np.interp, clamped so a
  new model can at most tie the best existing coder, never extrapolate), blended with
  cost and APPENDED to the 11 coding clusters; qwen3.7-plus has no DeepSWE signal so it
  proxies qwen3-coder-next''s q_norm (v0.78 pattern). Conversational clusters
  (2,9,10,11,15) get no new-model entry -> byte-identical routing there. Net vs v0.68:
  14/16 cluster top-1 winners UNCHANGED; only c8 and c14 flip opus-4-8 -> glm-5.2.
  minimax-m3 / kimi-k2.7 / qwen3.7-plus win no clusters (inert). quality_means carries
  the new columns (q_norm mapped onto each cluster''s existing [min,max]) so UI-alpha
  re-blends stay consistent. Anchor calibration mean r=+0.48 (c8 r=0.58 solid; c14
  r=0.19 sparse). Candidate; promote gates on cmd/routing-report + live bake-off.
  Inherited v0.68 behavior below: v0.68 = v0.67 with a per-cluster alpha demote on the conversational/NL clusters.
  Pure metadata delta: centroids.bin, quality_means.json, model_features.json, model_axes.json,
  model_registry.json and rankings.json are all BYTE-IDENTICAL to v0.67 (no retrain, no re-cluster).
  The only change is default_routing_knobs.alpha: clusters 2, 9, 10, 11, 15 drop 0.96 -> 0.80; all
  other clusters stay 0.96. Motivation: at the deployed uniform alpha=0.96 the cost term carries only
  4% of the blend, so conversational / trivial-NL turns route to Opus ~70-80% of the time even though
  every model handles them comparably (low per-cluster quality dispersion, Opus margin <0.02 z). The
  five demoted clusters are the NL/trivial-dominant clusters identified by the labeled register-probe
  corpus (testdata/register_probes.jsonl, 180 prompts x 6 registers); coding/agentic clusters (0, 5,
  13, ...) are left at 0.96 so Opus is retained where it earns a real margin. Offline replay over the
  corpus (cmd/routing-report) at top_p=2: conversational premium share 80% -> 43%, trivial-NL 90% -> 53%,
  with hard-code (80%/100%) and agentic-tool (93%/100%) UNCHANGED. NL traffic lands mostly on
  deepseek-v4-pro. The offline quality axis is the router''s own quality_means, not ground-truth solve
  rate -- the model mix is exact, the quality estimate is a proxy. Candidate only; promote gated on a
  live bake-off and the cmd/routing-report sign-off on the latest-bump PR.'
