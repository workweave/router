changelog: |
  v0.11 mixed/full, with per-model-zscore.
  Training data: mixed (OpenRouterBench + RouterArena full direct labels). Sub_10: included in training (benchmark-max, not held-out signal).
  Per-model-zscore: on.
  Sub_10 evaluation accuracy: 0.756 (post-cache-fix clean number).
  Part of the v0.10-v0.17 RouterArena-direct-label training matrix
  (2x2x2 ablation):
    - data: mixed (OpenRouterBench + RouterArena per-(prompt,model) labels)
            vs pure (RouterArena labels only).
    - sub_10: holdout (excluded from training) vs full (included;
              represents benchmark-max ceiling, not held-out signal).
    - per-model-zscore: post-alpha-blend rescale across the K clusters
              per model. Hypothesis was that it amplified tiny absolute
              score differences into spurious cluster peaks; v0.14-v0.17
              are the no-pmz counterparts.

  Sub_10 accuracy comparison (post-cache-fix; the semantic response
  cache was cosine-near-neighbor cross-attributing replayed responses
  to unrelated prompts, depressing every cluster router's measured
  accuracy by ~0.12-0.16. Numbers below are clean):
    v0.10 mixed/holdout/pmz   = 0.755
    v0.11 mixed/full/pmz      = 0.756
    v0.12 pure/holdout/pmz    = 0.726
    v0.13 pure/full/pmz       = 0.718
    v0.14 mixed/holdout/no-pmz= 0.770
    v0.15 mixed/full/no-pmz   = 0.768
    v0.16 pure/holdout/no-pmz = 0.768
    v0.17 pure/full/no-pmz    = 0.780  <- promoted as latest

