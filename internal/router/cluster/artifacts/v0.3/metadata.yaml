changelog: |
  v0.3 = v0.2 corpus + SWE-bench experiments direct labels.
  - Add 23 SWE-bench Verified submissions (~11,454 prompt-record pairs)
    via scripts/ingest/swebench.py. n_prompts grows 13014 → 13514
    (the SWE-bench problem statements deduplicate across submissions).
  - Promotes 3 v0.2 proxy entries to direct labels:
    * claude-sonnet-4-5: 4 SWE-bench submissions on the new
      claude-sonnet-4-5 column, plus 4 more on the v0.2
      claude-sonnet-4 column (different SWE-bench submissions on
      partially overlapping prompt sets, averaged per cell).
    * claude-opus-4-5: 2 submissions; also serves as a closer
      Anthropic-family proxy for claude-opus-4-7 vs v0.2's gpt-5
      proxy.
    * gemini-3-pro-preview: 1 submission.
  - claude-haiku-4-5 stays on its v0.2 gemini-2.5-flash proxy: no
    public benchmark with per-instance haiku scores has shipped yet.
  - gpt-5.5, gemini-3-flash-preview, gemini-3.1-flash-lite-preview
    stay on v0.2 proxies.
  - Ingest-side prompt truncation now keeps the prompt tail to match
    the runtime cluster.scorer.tailTruncate invariant (~161 of the
    11,454 SWE-bench records exceeded the 8192-char cap and changed
    embedded text region under this fix vs the prior head-keep build).
  - K=10, alpha=0.53 unchanged from v0.2; status=candidate;
    artifacts/latest still points at v0.2. Promote via
    `echo v0.3 > artifacts/latest` after the eval-harness smoke
    against `x-weave-cluster-version: v0.3` clears.
