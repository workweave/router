notes_v0_63: 'v0.63 = v0.62 bundle (identical centroids/quality_means/model_axes/registry)
  with per-cluster default alpha: 0.99 on clusters where claude-opus-4-8 is the argmax
  quality model [1, 6, 9, 12, 15] (hard agentic/coding), 0.9 elsewhere. Lifts opus-4-8
  share on the hard clusters (SWE-bench Pro/Easy/Terminal-bench) while keeping cheap
  models on easy/general traffic (Pareto). Offline-screened: TB 38.3->39.3 (cov 94%),
  Pro 8.8->10.5, Easy 76.3->80.1, opus easy-share 28->30%. No retrain (runtime re-blends
  live from quality_means via scorer.go default_routing_knobs).'
