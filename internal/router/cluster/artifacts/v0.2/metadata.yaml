# Cluster routing artifact v0.2 — multi-provider (Anthropic + OpenAI + Google)
#
# Drops v0.1's bench-column averaging. Each deployed entry now keeps its
# own ranking row from its bench_column 1:1, with proxy: true entries
# explicitly inheriting from another column (no silent averaging across
# columns). Adds OpenAI (GPT-5.5 family) and Google (Gemini 3.x preview)
# as routable providers.
#
# Trained on 13,014 OpenRouterBench prompts (full multi-provider corpus
# including arenahard, livecodebench, mmlu-pro splits that v0.1 didn't
# walk because the bench loader skipped 3-level layouts).

version: "v0.2"
parent: "v0.1"
status: latest
promoted_date: "2026-04-30"

embedder:
  model: jina-v2-base-code-int8
  embed_dim: 768
  max_tokens: 256

training:
  k: 10
  top_p: 4
  alpha: 0.53
  seed: 42
  n_prompts: 13014
  training_data_mix:
    d1: 1.0
    d2: 0.0
    d3: 0.0

deployed_providers:
  - anthropic
  - openai
  - google

deployed_models:
  - claude-opus-4-7
  - claude-sonnet-4-5
  - claude-haiku-4-5
  - gpt-5.5
  - gpt-4.1
  - gemini-3.1-pro-preview
  - gemini-3-flash-preview
  - gemini-3.1-flash-lite-preview

cost_per_1k_input_usd:
  claude-opus-4-7:                15.00
  claude-sonnet-4-5:               3.00
  claude-haiku-4-5:                0.80
  gpt-5.5:                         5.00
  gpt-4.1:                         2.00
  gemini-3.1-pro-preview:          2.00
  gemini-3-flash-preview:          0.50
  gemini-3.1-flash-lite-preview:   0.10

changelog: |
  - Add OpenAI (gpt-5.5, gpt-4.1) and Google (gemini-3.x preview family)
    as routable providers via OpenAI-compatible endpoints.
  - Drop bench_to_deployed averaging in train_cluster_router.py: each
    deployed entry copies its bench_column row 1:1 from the corpus,
    proxies labelled explicitly.
  - Fix bench_walker to handle 3-level layouts (arenahard/livecodebench
    /mmlupro test splits); training corpus grows from 751 → 13,014
    prompts.
  - Frontier-model refresh: gpt-5.5 (April 2026), gemini-3.x preview.
  - Cluster scorer becomes availability-aware at boot: filters
    deployed_models to providers whose API key is registered, fails
    loud if filtering empties the candidate set for any cluster.
