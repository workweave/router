changelog: "v0.64 = coding-first re-cluster (routerarena downweighted to 10% via
  source-fraction; +5 benchmark-corpus loaders) trained on full-pool coding labels
  (/tmp/coding_hard_labels: easy SWE + tb-1 hard, incl. the previously-unmeasured
  deployed models — qwen3-next-80b 14% hard, mimo 47%, gemini-3.5-flash 42%), alpha
  0.9, zscore, shrinkage 10, AA priors v0.62 (evidence 3.0). Emitted in v2 format
  (quality_means.json + model_axes.json) so the scorer re-blends live from
  default_routing_knobs (uniform alpha 0.9 == the v1 blend, so the v2 re-blend
  reproduces rankings.json exactly). rankings.json + model_registry.json are
  BIT-IDENTICAL to the experimental v9.68 run that was live-validated on staging, so
  its bake-off transfers directly. Live bake-off vs v0.63 (Claude Code, staging): TB
  44.9 vs 32.6 (+12.3, n=89), SWE-bench Pro 16.7 vs 3.3 (+13.4, n=30), Atlas QnA 20.0
  vs 13.3 (+6.7, n=30) — wins all three AND better $/resolved on each. Not just-opus:
  TB opus-4-8 turn share 50.5% vs v0.63 49.7%; the gain is from coding-first routing
  the non-opus turns smarter."
