changelog: "v0.59 — fork of v0.58 with z-ai/glm-5.1 removed. In the v0.58 SWE-bench Claude Code bake-off, 66 of 73 api_error shards (90%) had glm-5.1 on both the original turn and Claude Code's retry: glm-5.1 emits tool-call JSON the Anthropic Messages parser refuses (truncated structs, unbalanced braces, mid-string EOF). This is a structural client-incompatibility, not an availability problem — upstream HTTP succeeds. tok_per_s + cost rows for glm-5.1 stripped to match. Companion router-side mitigation in PR #281 substitutes `{}` for invalid tool args at content_block_stop time so a single stranded turn no longer kills the session."
