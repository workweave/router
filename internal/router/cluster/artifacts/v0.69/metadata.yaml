changelog: 'v0.65 = v0.64 (metadata-only, no retrain) with two changes that attack
  the cost-driven coding/QnA misroutes found in the v0.64 live shards (cheap tail
  0/13 dominant on Atlas, 0/8 on Pro): (1) cap claude-opus-4-7 quality_means at claude-opus-4-8
  (same $0.005/1k price, 4-8 >= 4-7 everywhere) so 4-8 is always preferred -- reclaims
  c8/c11/c14/c15 from 4-7 (Atlas opus-4-7 was 144 turns / 0/4); (2) uniform routing
  alpha 0.9 -> 0.96, shrinking the 0.1 cost term that promoted equal-quality cheap
  models over opus-4-8 -- reclaims c0 (Pro 47% / Atlas 93% of top-4) mimo->opus-4-8
  and c12 opus-4-7->gpt-5.5 (the live Pro MVP, 5/7), while leaving quality-driven
  cheap wins (c1/c4/c6/c7/c9 haiku/qwen/gemini-flash, c5 deepseek, c13 gemini-flash)
  untouched so the v0.64 TB strong-cheap routing is preserved. rankings.json regenerated
  by the exact v2 blend at alpha=0.96 (TestV2MatchesV1 holds). TB-safety (c0 is 92%
  of TB top-4) is the one thing only the live bake-off can settle.'
