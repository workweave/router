changelog: 'v0.76 = v0.75 + gpt-5.6-sol (OpenAI 5.6 family, TierHigh, $5/$30, 1.05M context). Reconciles
  the gpt-5.6 catalog add (router#721, merged 2026-07-15) with the roster-onboarding overlay that was
  drafted the same week (origin/add-gpt56-v075-overlay, commit 4ae87e1) but never merged before opus-5''s
  v0.75 (router#833) landed first and forked from a different parent (v0.73). This is a fresh column append
  via append_quality_column.py onto the CURRENT v0.75 (post-opus-5), not a resurrection of the orphaned
  branch. centroids.bin BYTE-IDENTICAL to v0.75 (parity gate: the runtime blend reproduces v0.75''s own
  rankings.json bit-for-bit with the lineage''s actual bake-time knobs -- uniform alpha=0.96, no speed/output-cost
  term -- NOT the per-cluster alpha-floor vector in training.default_routing_knobs, which is a separate
  request-time dial default that this blend does not reproduce). Sol''s per-cluster cell is fit from its
  Tier-3 SWE-bench Easy solve rate (add-gpt-5.6-sol, 582 shards) against 5 incumbents with labels in the
  same clusters (claude-fable-5, claude-sonnet-5, kimi-k2.7, minimax-m3, qwen3.7-plus, glm-5.2) on coding
  clusters 5/8/13/14; all other clusters impute from gpt-5.5 (cap-at-incumbent, same tier/price class).
  No probe run needed -- Tier-3 labels already existed on GCS from Sol''s original onboarding probe (2026-07-15/16).
  Candidate; promotion gated on a live bake-off per ROUTER_MODEL_LIFECYCLE.md before any latest bump.


  v0.75 = v0.73 with claude-opus-4-8 retired and claude-opus-5 added in its place (routing-roster swap;
  same $5/$25 price). centroids.bin BYTE-IDENTICAL to v0.73 (no retrain, no re-cluster). claude-opus-5''s
  quality_means column is a manual clone of claude-fable-5''s per-cluster cells (per direction "make opus
  5 similar to fable"), priced at opus-5''s real catalog rate (0.005/0.025 per 1k), NOT fable''s ($10/$50).
  rankings.json regenerated by the exact runtime blend over the new 18-model roster (parity-gated: the
  same blend reproduces v0.73 bit-for-bit on the unchanged roster first). No probe run and no bake-off
  (explicit direction). Candidate; latest bump is a separate step.


  v0.70 = v0.68 with four new models added on FROZEN v0.68 geometry (z-ai/glm-5.2, minimax/minimax-m3,
  moonshotai/kimi-k2.7, qwen/qwen3.7-plus). centroids.bin is BYTE-IDENTICAL to v0.68 (no retrain, no re-cluster):
  v0.68''s training corpus is no longer reproducible (OpenRouterBench source returns 0 rows, routerarena
  label file drifted), so retraining would churn the geometry (the rejected v0.69 path regressed hard-agentic
  solve ~13pt purely from cluster movement). Instead this is a geometry-frozen ADDITIVE OVERLAY (scripts/build_v079_additive_overlay.py):
  each new model is calibrated onto v0.68''s per-cluster q_norm scale via existing models'' shared v0.68-geometry
  DeepSWE solve rates (eval/deepswe_quality_priors_v0.68.json) as anchors (np.interp, clamped so a new
  model can at most tie the best existing coder, never extrapolate), blended with cost and APPENDED to
  the 11 coding clusters; qwen3.7-plus has no DeepSWE signal so it proxies qwen3-coder-next''s q_norm
  (v0.78 pattern). Conversational clusters (2,9,10,11,15) get no new-model entry -> byte-identical routing
  there. Net vs v0.68: 14/16 cluster top-1 winners UNCHANGED; only c8 and c14 flip opus-4-8 -> glm-5.2.
  minimax-m3 / kimi-k2.7 / qwen3.7-plus win no clusters (inert). quality_means carries the new columns
  (q_norm mapped onto each cluster''s existing [min,max]) so UI-alpha re-blends stay consistent. Anchor
  calibration mean r=+0.48 (c8 r=0.58 solid; c14 r=0.19 sparse). Candidate; promote gates on cmd/routing-report
  + live bake-off. Inherited v0.68 behavior below: v0.68 = v0.67 with a per-cluster alpha demote on the
  conversational/NL clusters. Pure metadata delta: centroids.bin, quality_means.json, model_features.json,
  model_axes.json, model_registry.json and rankings.json are all BYTE-IDENTICAL to v0.67 (no retrain,
  no re-cluster). The only change is default_routing_knobs.alpha: clusters 2, 9, 10, 11, 15 drop 0.96
  -> 0.80; all other clusters stay 0.96. Motivation: at the deployed uniform alpha=0.96 the cost term
  carries only 4% of the blend, so conversational / trivial-NL turns route to Opus ~70-80% of the time
  even though every model handles them comparably (low per-cluster quality dispersion, Opus margin <0.02
  z). The five demoted clusters are the NL/trivial-dominant clusters identified by the labeled register-probe
  corpus (testdata/register_probes.jsonl, 180 prompts x 6 registers); coding/agentic clusters (0, 5, 13,
  ...) are left at 0.96 so Opus is retained where it earns a real margin. Offline replay over the corpus
  (cmd/routing-report) at top_p=2: conversational premium share 80% -> 43%, trivial-NL 90% -> 53%, with
  hard-code (80%/100%) and agentic-tool (93%/100%) UNCHANGED. NL traffic lands mostly on deepseek-v4-pro.
  The offline quality axis is the router''s own quality_means, not ground-truth solve rate -- the model
  mix is exact, the quality estimate is a proxy. Candidate only; promote gated on a live bake-off and
  the cmd/routing-report sign-off on the latest-bump PR.'
