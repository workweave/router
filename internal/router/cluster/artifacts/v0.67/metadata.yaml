changelog: 'v0.67 = retrain of v0.64''s quality_means with the corrected AA-prior chain; centroids.bin
  is BYTE-IDENTICAL to v0.64/v0.65 (sha256 57b06f95..), so all cluster semantics carry over. Fixes two
  label-pipeline bugs in the served v0.65 (see WW#8562): (1) aa_quality_priors_v0.62.json was generated
  against v0.61 cluster geometry and injected into the re-clustered v0.64 by raw cluster id (only 4/16
  ids carry over); (2) it was generated without --registry, so DEPLOYED models received easy-benchmark
  AA pseudo-labels that the native-override is designed to drop. Net effect in prod: NL/easy clusters
  (c1/c4/c6/c7) ranked haiku/qwen3-next/flash-lite above opus-4-8 as pure artifact. With the corrected
  chain (aa_quality_priors_v0.64.json: geometry-tagged v0.64, --registry native-override) AA priors cover
  0/240 deployed cells -- deployed models train on NATIVE labels only (RouterArena direct + swebench easy/tb-1/hardV
  pool, reassembled from the banked GCS shard runs tier3-full-20260527, tier3-fill-20260603, tier3-fill-gemini35-20260603,
  tier3-opus48-20260529, codeprobe-newmodels-easy, tier3-tb1-full/pilot/thinking-20260604, tier3-hard-pilot-20260604;
  build_error shards dropped; 1775 training prompts, identical to v0.64). Corpus identity vs v0.64 PROVEN
  by k-means fixed-point check (v0.64 centroids reproduce from this corpus at the same noise floor as
  a fresh fit); the byte-exact k-means init order of the deleted original label dir is unrecoverable,
  so quality_means was recomputed against the pinned v0.64 centroids via the trainer''s own post-fit cosine
  label reassignment (a pure function of centroids+embeddings+labels -- no init sensitivity). Trained
  at alpha 0.9 (v0.64 recipe), then the two v0.65 metadata deltas re-applied: claude-opus-4-7 quality_means
  capped at claude-opus-4-8 (same $0.005/1k price), uniform runtime alpha 0.9 -> 0.96 via default_routing_knobs;
  rankings.json regenerated by the exact v2 blend at alpha=0.96 (blend impl verified bit-exact vs served
  v0.65). model_features.json psi_probe regenerated = final quality_means (runtime override consistency).
  Supersedes the parked v0.67 floor-patch approach (router#370): no hand-set floors, no per-cell edits.
  Candidate only -- promote gated on live bake-off; trainer guardrails (--aa-geometry) land via WW#8562.'
