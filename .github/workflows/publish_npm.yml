# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Publish the @workweave/router npm package on tag push.
#
# Trigger: push a tag matching `router-v*` (e.g. `router-v0.1.0`). The job
# asserts the tag's version matches install/npm/package.json before publishing
# — mismatched tag fails fast instead of shipping a wrong version.
#
# Publish auth: npm OIDC trusted publishing (no secret in the repo). Configure
# the @workweave/router package on npmjs.com → Settings → Trusted Publishers
# → GitHub Actions with org=workweave, repo=router, workflow=publish_npm.yml.
name: Publish npm

on:
  push:
    tags:
      - "router-v*"

jobs:
  publish:
    name: Publish @workweave/router
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC + provenance
    defaults:
      run:
        working-directory: install/npm
    steps:
      # Third-party actions pinned to commit SHAs because this job has
      # `id-token: write` and publishes to npm — a retargeted floating tag
      # would let upstream-action compromise publish a malicious package.
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          # Node 24 ships with npm ≥ 11.5, which is the minimum that supports
          # OIDC trusted publishing. Node 20 (npm 10) would 401 at publish.
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF#refs/tags/router-v}"
          pkg_version="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg_version" ]; then
            echo "::error::Tag version ($tag) does not match package.json version ($pkg_version)"
            exit 1
          fi
          echo "Publishing @workweave/router@$pkg_version"

      - name: Publish to npm
        run: npm publish --provenance --access public
