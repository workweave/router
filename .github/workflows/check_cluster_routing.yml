# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
#
# Cluster routing review gate.
#
# When a PR changes the deployed clustering model (the `latest` pointer under
# internal/router/cluster/artifacts/), the `report` job routes a labeled probe
# corpus through the real Scorer and posts a sticky PR comment showing where
# each register (conversational / trivial / coding / agentic) now routes, plus
# a diff vs the currently-deployed artifact. Merge is blocked by the required
# status `cluster-routing/acknowledged` until a maintainer ticks the checkbox
# in that comment. Any later change to `latest` rewrites the report (new hash)
# and unticks the box, re-blocking — so a stale sign-off can't ship.
#
# Two jobs by design:
#   * report      — runs ONLY on pull_request. Checks out + runs PR code to
#                   render the report. pull_request gives fork PRs a read-only
#                   token, so executing PR code here is not privileged.
#   * acknowledge — runs ONLY on issue_comment, with NO checkout and NO code
#                   execution. It just reads the tick state of the bot's own
#                   sticky comment and sets the status. This keeps untrusted
#                   PR code out of the privileged (write-token) issue_comment
#                   context (CodeQL: "checkout of untrusted code in a
#                   privileged context").
#
# Only a tick on the BOT's sticky comment counts — and only repo writers can
# edit another user's comment, so a third party can't forge an ack by posting
# their own ticked comment.
#
# The report runs with `-tags no_onnx`: probe embeddings are precomputed and
# committed, so no ONNX runtime is needed (regenerate with
# scripts/embed_register_probes.py; the Test workflow fails on a stale cache).
name: Cluster Routing Review

on:
  # No paths filter: the required status must be reported on every PR, so a PR
  # that doesn't touch artifacts short-circuits to a passing status.
  pull_request:
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: write
  issues: write
  statuses: write

concurrency:
  group: cluster-routing-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

env:
  CHECK_CONTEXT: cluster-routing/acknowledged
  COMMENT_MARKER_PREFIX: "<!-- cluster-routing-report:"
  BOT_LOGIN: "github-actions[bot]"

jobs:
  report:
    name: Routing review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Determine target + baseline artifact
        id: vers
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          ART=internal/router/cluster/artifacts
          head_latest="$(tr -d '[:space:]' < "$ART/latest")"
          base_latest="$(git show "$BASE_SHA:$ART/latest" 2>/dev/null | tr -d '[:space:]' || echo '')"
          if [ "$head_latest" != "$base_latest" ]; then
            echo "gate=true" >> "$GITHUB_OUTPUT"
            echo "target=$head_latest" >> "$GITHUB_OUTPUT"
            echo "baseline=$base_latest" >> "$GITHUB_OUTPUT"
          else
            changed="$(git diff --name-only "$BASE_SHA...$HEAD_SHA" -- "$ART/" \
              | grep -oE 'artifacts/v[0-9]+\.[0-9]+/' | sed -E 's#artifacts/##; s#/##' \
              | sort -uV | tail -1 || true)"
            if [ -z "$changed" ]; then
              echo "gate=skip" >> "$GITHUB_OUTPUT"
            else
              echo "gate=false" >> "$GITHUB_OUTPUT"
              echo "target=$changed" >> "$GITHUB_OUTPUT"
              echo "baseline=$head_latest" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Render routing report
        if: steps.vers.outputs.gate != 'skip'
        env:
          TARGET: ${{ steps.vers.outputs.target }}
          BASELINE: ${{ steps.vers.outputs.baseline }}
        run: |
          set -euo pipefail
          args=(--target "$TARGET")
          if [ -n "$BASELINE" ]; then args+=(--baseline "$BASELINE"); fi
          go run -tags no_onnx ./cmd/routing-report "${args[@]}" --out /tmp/routing_report.md
          cat /tmp/routing_report.md

      - name: Upsert comment and set status
        if: steps.vers.outputs.gate != 'skip'
        uses: actions/github-script@v7
        env:
          GATE: ${{ steps.vers.outputs.gate }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const fs = require('fs');
            const crypto = require('crypto');
            const pr = Number(process.env.PR_NUMBER);
            const headSha = process.env.HEAD_SHA;
            const gate = process.env.GATE === 'true';
            const CHECK = process.env.CHECK_CONTEXT;
            const PREFIX = process.env.COMMENT_MARKER_PREFIX;
            const BOT = process.env.BOT_LOGIN;
            const ACK_RE = /- \[[xX]\] I have reviewed/;

            const report = fs.readFileSync('/tmp/routing_report.md', 'utf8').trim();
            const hash = crypto.createHash('sha256').update(report).digest('hex').slice(0, 12);
            const marker = `${PREFIX}${hash} -->`;

            // Only the bot's own sticky comment can carry an acknowledgment.
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...context.repo, issue_number: pr, per_page: 100,
            });
            const existing = comments.find(c =>
              c.user.login === BOT && c.body.includes(PREFIX));

            // Acknowledged only if the box is ticked on a bot comment carrying
            // the CURRENT report hash; a report change invalidates it.
            const ticked = !!existing && existing.body.includes(marker) && ACK_RE.test(existing.body);

            const box = ticked ? '[x]' : '[ ]';
            const note = gate
              ? '> ⚠️ **This PR changes the deployed router (`latest`).** Review where conversational / trivial turns now land, then tick the box below to unblock merge.'
              : '> ℹ️ Informational — candidate artifact (`latest` unchanged); no sign-off required.';
            const ackBlock = gate
              ? `\n\n---\n- ${box} I have reviewed the routing distribution above and accept it.\n\n_Ticking this unblocks merge. Any further change to \`latest\` resets it._`
              : '';
            const body = `${marker}\n### 🧭 Cluster routing review\n${note}\n\n${report}${ackBlock}`;

            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: pr, body });
            }

            const state = (!gate || ticked) ? 'success' : 'failure';
            const description = !gate
              ? 'Candidate artifact — no deployed-model change'
              : (ticked ? 'Routing distribution acknowledged' : 'Review the routing report and tick the box to unblock');
            await github.rest.repos.createCommitStatus({ ...context.repo, sha: headSha, context: CHECK, state, description });

      - name: Pass check when no artifact-version change
        if: steps.vers.outputs.gate == 'skip'
        uses: actions/github-script@v7
        env:
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              ...context.repo, sha: process.env.HEAD_SHA,
              context: process.env.CHECK_CONTEXT, state: 'success',
              description: 'No deployed-model change',
            });

  acknowledge:
    name: Routing review
    # Fires only when a human edits/creates the BOT's own sticky comment.
    # No checkout, no code execution -> no untrusted code in this write-token
    # context. Only repo writers can edit another user's comment, so a third
    # party cannot forge an acknowledgment.
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.sender.type != 'Bot' &&
      github.event.comment.user.login == 'github-actions[bot]' &&
      contains(github.event.comment.body, '<!-- cluster-routing-report:')
    runs-on: ubuntu-latest
    steps:
      - name: Set status from checkbox state
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.issue.number }}
        with:
          script: |
            const pr = Number(process.env.PR_NUMBER);
            const CHECK = process.env.CHECK_CONTEXT;
            const PREFIX = process.env.COMMENT_MARKER_PREFIX;
            const ACK_RE = /- \[[xX]\] I have reviewed/;

            const body = context.payload.comment.body;
            // Only gating reports carry the checkbox; a candidate (informational)
            // comment has no ack line, so there's nothing to toggle.
            if (!ACK_RE.test(body) && !body.includes('I have reviewed')) {
              core.info('No acknowledgment checkbox in this comment; nothing to do.');
              return;
            }
            const ticked = ACK_RE.test(body);

            const { data: prData } = await github.rest.pulls.get({ ...context.repo, pull_number: pr });
            const headSha = prData.head.sha;

            await github.rest.repos.createCommitStatus({
              ...context.repo, sha: headSha, context: CHECK,
              state: ticked ? 'success' : 'failure',
              description: ticked ? 'Routing distribution acknowledged' : 'Review the routing report and tick the box to unblock',
            });
