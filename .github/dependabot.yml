version: 2
updates:
  # Go module (router server).
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      go-minor-patch:
        update-types: [minor, patch]

  # GitHub Actions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  # Dashboard frontend.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types: [minor, patch]

  # Published install CLI package.
  - package-ecosystem: npm
    directory: "/install/npm"
    schedule:
      interval: weekly
    groups:
      npm-minor-patch:
        update-types: [minor, patch]
